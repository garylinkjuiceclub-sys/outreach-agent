name: Scrape From List

on:
  workflow_dispatch:        # Manual trigger from Actions tab
    inputs:
      csv_file:
        description: 'CSV file to scrape (e.g. scrape_list.csv)'
        required: true
        default: 'scrape_list.csv'

jobs:
  scrape-list:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape domains from CSV list
        env:
          PIPELINE_MODE: csv
          SCRAPE_LIST: ${{ github.event.inputs.csv_file }}
        run: python run_pipeline.py "${{ github.event.inputs.csv_file }}"

      - name: Upload Excel output
        uses: actions/upload-artifact@v4
        with:
          name: outreach-list-${{ github.run_number }}
          path: output/*.xlsx
          retention-days: 90

      - name: Commit outreach contacts to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/outreach_contacts.csv || true
          git diff --staged --quiet || git commit -m "chore: update outreach contacts from CSV scrape [skip ci]"
          git push || true
