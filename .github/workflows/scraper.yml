name: Email Scraper Agent

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 2'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      HUNTER_API_KEY:     ${{ secrets.HUNTER_API_KEY }}
      GOOGLE_API_KEY:     ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_CSE_ID:      ${{ secrets.GOOGLE_CSE_ID }}
      ENABLE_PLAYWRIGHT:  "true"
      ENABLE_SMTP_VERIFY: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml playwright dnspython

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run Email Scraper Agent
        run: python email_scraper.py

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: emails-output
          path: emails_output.csv
          retention-days: 30

      - name: Commit results back to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add emails_output.csv
          git diff --staged --quiet || git commit -m "chore: update emails_output $(date +'%Y-%m-%d')"
          git push
