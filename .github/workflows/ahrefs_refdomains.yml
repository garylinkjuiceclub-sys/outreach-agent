name: Ahrefs Referring Domains Scrape

on:
  workflow_dispatch:
    inputs:
      competitor_domains:
        description: 'Comma-separated competitor domains (e.g. paddypower.com,betfair.com)'
        required: true
      market:
        description: 'Market code (UK, FI, DK, SE, NL, RO). FI/DK also scrapes Kadaza.'
        required: false
        default: ''
      rows_per_competitor:
        description: 'Referring domains to pull per competitor (default 500)'
        required: false
        default: '500'

jobs:
  ahrefs-refdomains:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull referring domains & scrape contacts
        env:
          PIPELINE_MODE: ahrefs
          AHREFS_API_KEY: ${{ secrets.AHREFS_API_KEY }}
          COMPETITOR_DOMAINS: ${{ github.event.inputs.competitor_domains }}
          MARKET: ${{ github.event.inputs.market }}
          ROWS_PER_COMPETITOR: ${{ github.event.inputs.rows_per_competitor }}
        run: python run_pipeline.py

      - name: Upload Excel report
        uses: actions/upload-artifact@v4
        with:
          name: refdomains-${{ github.event.inputs.market || 'global' }}-${{ github.run_number }}
          path: output/*.xlsx
          retention-days: 90

      - name: Commit updated contacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/outreach_contacts.csv || true
          git diff --staged --quiet || git commit -m "chore: update contacts from Ahrefs refdomains (${{ github.event.inputs.market || 'global' }}) [skip ci]"
          git push || true
