name: Daily Outreach Emails

on:
  schedule:
    # Runs Monday–Friday at 8:00am UTC
    - cron: '0 8 * * 1-5'
  workflow_dispatch:        # Also triggerable manually any time from the Actions tab

jobs:
  send-emails:
    runs-on: ubuntu-latest
    # Up to 400 emails across 4 accounts, 45–90s delay between each send per
    # account. Worst case: 400 × 90s ÷ 4 accounts (parallel per account) ≈ 2.5 hrs.
    # We run accounts sequentially so allow the full window.
    timeout-minutes: 480

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send outreach emails
        env:
          SMTP_USER_1: ${{ secrets.SMTP_USER_1 }}
          SMTP_PASS_1: ${{ secrets.SMTP_PASS_1 }}
          SMTP_USER_2: ${{ secrets.SMTP_USER_2 }}
          SMTP_PASS_2: ${{ secrets.SMTP_PASS_2 }}
          SMTP_USER_3: ${{ secrets.SMTP_USER_3 }}
          SMTP_PASS_3: ${{ secrets.SMTP_PASS_3 }}
          SMTP_USER_4: ${{ secrets.SMTP_USER_4 }}
          SMTP_PASS_4: ${{ secrets.SMTP_PASS_4 }}
        run: python send_emails.py

      # Commit the updated sent log back so contacts are never emailed twice
      - name: Commit sent log to repo
        if: always()   # Run even if some emails failed, to preserve partial progress
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/sent_log.csv || true
          git diff --staged --quiet || git commit -m "chore: update sent log [skip ci]"
          git push || true
